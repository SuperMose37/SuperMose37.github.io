<html>
    <head>
        <title>survival game</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body{
                text-align:center;
                }
            #reboot{
                display:none
                }
            #flashlight{
                display:none;
                margin-top:-9.5px;
                margin-left:-9.5px;
                --Xpos:50vw;
                --Ypos:50vh;
                }
            #sat{
                z-index:-1;
                }
            #flashlight:before{
                content:"";
                display:block;
                width:100%;
                height:100%;
                position:absolute;
                pointer-events:none;
                background:radial-gradient(
                    circle 3em at var(--Xpos) var(--Ypos), 
                    rgba(0, 0, 0, 0), 
                    rgba(0, 0, 0, 1)
                    );
                }
            #lore{
                display:none;
                }
            #flood{
                display:block;
                position:absolute;
                margin-top:700.5px;
                margin-left:-9.5px;
                width:100%;
                height:100%;
                background-image:linear-gradient(cyan, blue);
                opacity:50%;
                z-index:1;
                }
            #unwata{
                z-index:2;
                }
        </style>
    </head>
    <body onscroll="scrollTo(0, 0)">
        <div id="flashlight"></div>
        <div id="flood"></div>
         <button id="unwata" onclick="drain()">drain water</button>
        <h1>yes</h1>
        <p>this is a test</p>
        <p>upload code to database to gain money, click the button below to generate code, mine for water and hunt for food</p>
        <p id="lore" onclick="alert('ure wokin in a spas travo chekpot on erf n u hav 2 giv cod 2 da spas sip dat pasus here so day can pas thru da chekpot n in rewrd, dey giv ub 10$ dola, bu sins dis is da fewtrer, mani hueman wen 2 oder pnlet 2 lif n erf hav oni a fiw ppl lef, so  dere is no mor hueman 2 saf u n u hav 2 surfive :D :D')">click here 4 lore</p>
        <p id="money" >money:</p>
        <label for="pow">power</label>
        <progress id="pow" min="0" max="100" value="0"></progress>
        <br>
        <label for="wata">usable water</label>
        <progress id="wata" min="0" max="100" value="0"></progress>
        <br>
        <label for="sat">saturation:</label>
        <progress id="sat" min="0" max="100" value="0">saturation</progress>
        <br>
        <label for="thir">thirst:</label>
        <progress id="thir" min="0" max="100" value="0">thirst</progress>
        <br>
        <p id="unfud">food:</p>
        <button onclick="mine()" id="mine">mine water</button>
        <button onclick="hunt()" id="hunt">hunt food</button>
        <button onclick="drink()">drink water</button>
        <button onclick="eat()">eat food</button>
        <button id="reboot" onclick="rebut()">reboot power</button>
        <p onclick="shop()">shop</p>
        <br>
        <p>click box to activate:</p>
        <input id="wpm" type="checkbox">
        <lable>water powered electricity generator</lable>
        <br>
        <button id="co" onclick="gen(10)">generate code</button>
        <br>
        <br>
        <input id="usco" placeholder="input generated code here">
        <button onclick="upload()">upload code</button>
        <script>
            const evs = ["none", "fog", "flood", "wildfire", "power-outage"]
            let ev = "none";
            let sen = "";
            let money = 0;
            let saturation = 100;
            let thirst = 100;
            let water = 0;
            let unfood = 0;
            let power = 100;
            let eglv  = 0;
            let wmlv = 0;
            let wtc = 100;
            let night = 1;
            let hour = 0;
            let minuets = 0;
            let wmlvmv = 10;
            let eglvmv = 20;
            let wtcmv = 35;
            let wtlv = 700.5;
            function flash(){
                document.getElementById("flashlight").style.display="block";
                let mouseX = 0;
                let mouseY = 0;
                let flashlight = document.getElementById("flashlight");
                const mobile = ()=>{
                    try {
                        document.createEvent("TouchEvent");
                        return true;
                    } catch(e) {
                        return false;
                        }
                    }
                function mopo(e){
                    mouseX = !mobile() ? e.pageX : e.touches[0].pageX;
                    mouseY = !mobile() ? e.pageY : e.touches[0].pageY;
                    flashlight.style.setProperty("--Xpos", mouseX + "px");
                    flashlight.style.setProperty("--Ypos", mouseY + "px");
                    }
                document.addEventListener("mousemove", mopo);
                document.addEventListener("touchmove", mopo);
                }

            function butt(){
                let reboot = document.getElementById("reboot");
                reboot.style.display="inline";
                }
            function wpm(){
                if(water>0){
                    water--;
                    power+=eglv;
                    }
                else{
                    }
                }
            setInterval(()=>{document.getElementById("money").innerText="money:" + money;},1)
            setInterval(()=>{document.getElementById("unfud").innerText="uncook food:" + unfood;},1)
            setInterval(()=>{document.getElementById("sat").value=saturation;},1)
            setInterval(()=>{document.getElementById("thir").value=thirst;},1)
            setInterval(()=>{document.getElementById("wata").value=water;},1)
            setInterval(()=>{document.getElementById("pow").value=power;},1)
            setInterval(()=>{document.getElementById("wata").max=wtc;},1)
            setInterval(()=>{saturation--}, 1500)
            setInterval(()=>{thirst--}, saturation*10)
            setInterval(()=>{power--}, 2000)
            setInterval(()=>{if(thirst<0){alert("u died")}else{};},1)
            setInterval(()=>{if(saturation<0){alert("u died")}else{};},1)
            setInterval(()=>{if(power<0){flash();butt();}else{};},1)
            setInterval(()=>{event()},50)
            setInterval(()=>{lore()},100)
            setInterval(()=>{let mc = document.getElementById("wpm").checked;if(mc && water>0){wpm();}else if(!mc){};},500)
            setInterval(()=>{document.getElementById("flood").style.marginTop = wtlv + "px";},1)
            function gen(length){
                document.getElementById("co").innerText = "";
                sen = "";
                for(i=0;i<length;i++){
                    let num = Math.floor(Math.random()*93)+33;
                    sen += String.fromCharCode(num);
                    //alert(sen) -this is cool thing-
                }
                document.getElementById("co").innerText = sen;
                }
            function upload(){
                let user = document.getElementById("usco").value;
                if(user==sen){
                    document.getElementById("usco").value = "";
                    money += 10;
                    sen = "";
                    }
                else{
                    alert("invalid code");
                }
                }
            function mine(){
                if(water<wtc){
                let mtime = Math.floor(Math.random()*2000)+2000;
                setTimeout(()=>{water+=10;}, mtime-wmlv*100);
                document.getElementById("mine").disabled = true;
                setTimeout(()=>{document.getElementById("mine").disabled = false;},mtime-wmlv*100)
                    }
                else if(water>=wtc){
                    alert("water tank full");
                    }
                }
            function drink(){
                if(water>0){
                water-=20;
                thirst++;
                }
                else{
                    }
                }
            function hunt(){
                let htime = Math.floor(Math.random()*2000)+2000
                document.getElementById("hunt").disabled = true;
                setTimeout(()=>{unfood += Math.floor(Math.random()*5);},htime)
                setTimeout(()=>{document.getElementById("hunt").disabled = false;},htime)
                }
            function eat(){
                unfood--;
                saturation+=5;
                }
            function rebut(){
                document.getElementById("reboot").disabled = true;
                setTimeout(()=>{document.getElementById("reboot").disabled = false;document.getElementById("reboot").style.display="none";power=20;document.getElementById("flashlight").style.display="none";}, 2000);
                }
            function shop(){
                let chose = prompt("choose an upgrade \n1.electricity generator lv." + eglv +" "+ eglvmv + "$\n2.water miner lv." + wmlv + " " + wmlvmv + "$\n3.water tank compacity " + wtc + "L " + wtcmv + "$");
                if(chose==1){
                    if(money<eglvmv){
                        alert("u por")
                        }
                    else{
                    eglv++;
                    eglvmv+=10;
                    money-=eglvmv
                        }
                    }
                else if(chose==2){
                    if(money<wmlvmv){
                        alert("u por")
                        }
                    else{
                    wmlv++;
                    wmlvmv+=10;
                    money-=wmlvmv
                        }
                    }
                else if(chose==3){
                    if(money<wtcmv){
                        alert("u por");
                        }
                    else{
                    wtc+=10;
                    wtcmv+=10;
                    money-=wtcmv
                        }
                    }
                else{
                    alert("invalid input");
                    }
                }
            function fog(){
                let i = 0;
                setInterval(()=>{if(i<3){document.body.style.filter="blur("+ i +"px)";i+=0.1}else{};},100);
                setTimeout(()=>{document.body.style.filter="none"},10000);
                }
            function flood(){
                setInterval(()=>{if(wtlv>-9.5){wtlv-=1;}else{}},10)
                }
            function event(){
                let ran = Math.floor(Math.random()*1000)
                if(ran==293){
                    let eran = Math.floor(Math.random()*evs.length)
                    ev = evs[eran]
                    if(ev=="fog"){
                        fog();
                        }
                    else if(ev=="wildfire"){
                        wildfire();
                        }
                    else if(ev=="flood"){
                        flood();
                        }
                    else if(ev=="power-outage"){
                        flash();
                        butt();
                        }
                    else{

                        }
                    }
                else{
                    
                    }
                }
            function lore(){
                if(Math.floor(Math.random()*1000)==249){
                document.getElementById("lore").style.display="inline"
                setTimeout(()=>{document.getElementById("lore").style.display="none"},2000)
                    }
                else{
                    }
                }
            function drain(){
                if(wtlv<700.5){
                wtlv+=25
                    }
                else{

                    }
                }
        </script>
    </body>
</html>
